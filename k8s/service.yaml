apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: NodePort          
  selector:
    app: flask-app        
  ports:
    - protocol: TCP
      port: 80            # Port inside the cluster
      targetPort: 5000    # Port inside the container (Flask listens here)
      nodePort: 30080     # Port exposed on the EC2 public IP (access via :30080)
